<section class="page"><header><div><span>COLOR LAB · ACQUISTI</span><h1>Ordini fornitori</h1></div><a class="primary" routerLink="/color-lab/reorder">Centro riordino</a></header>@if(errorMessage()){<div class="error">{{errorMessage()}}</div>}<div class="list">@for(o of orders();track o.id){<a [routerLink]="['/color-lab/orders',o.id]"><div><small>{{o.orderNumber}}</small><strong>{{o.supplierName}}</strong></div><div><small>STATO</small><strong>{{labels[o.status]}}</strong></div><div><small>RIGHE</small><strong>{{o.items.length}}</strong></div><div><small>CREATO</small><strong>{{o.createdAt|date:'dd/MM/yyyy HH:mm'}}</strong></div></a>}</div></section>
